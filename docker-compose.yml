version: '3.8'

services:

  # ============================================================
  # INFRAESTRUTURA - Bancos de dados e serviços de suporte
  # ============================================================

  # Instância 1 de PostgreSQL — exclusiva para o auth-service
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    volumes:
      - ./auth-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Instância 2 de PostgreSQL — compartilhada pelo flag-service e targeting-service
  # (tabelas distintas: 'flags' e 'targeting_rules' no mesmo banco)
  postgres-flags:
    image: postgres:15-alpine
    container_name: postgres-flags
    environment:
      POSTGRES_USER: flags_user
      POSTGRES_PASSWORD: flags_pass
      POSTGRES_DB: flags_db
    volumes:
      - ./flag-service/db/init.sql:/docker-entrypoint-initdb.d/01_flags.sql:ro
      - postgres-flags-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flags_user -d flags_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — cache do evaluation-service
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Instância 3 de PostgreSQL — exclusiva para o targeting-service
  postgres-targeting:
    image: postgres:15-alpine
    container_name: postgres-targeting
    environment:
      POSTGRES_USER: targeting_user
      POSTGRES_PASSWORD: targeting_pass
      POSTGRES_DB: targeting_db
    volumes:
      - ./targeting-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-targeting-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U targeting_user -d targeting_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # LocalStack — emula DynamoDB Local e SQS localmente
  localstack:
    image: localstack/localstack:3.4
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,dynamodb
      AWS_DEFAULT_REGION: us-east-1
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # Cria a fila SQS e a tabela DynamoDB no LocalStack antes dos serviços subirem
  aws-init:
    image: amazon/aws-cli:2.15.30
    container_name: aws-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Criando recursos AWS no LocalStack..." &&
        aws --endpoint-url=http://localstack:4566 sqs create-queue \
          --queue-name togglemaster-events &&
        (aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name ToggleMasterAnalytics \
          --attribute-definitions AttributeName=event_id,AttributeType=S \
          --key-schema AttributeName=event_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST 2>&1 || echo "Tabela ja existe, continuando...") &&
        echo "Recursos AWS prontos."
    restart: on-failure

  # ============================================================
  # MICROSSERVIÇOS
  # ============================================================

  auth-service:
    build:
      context: ./auth-service
    ports:
      - "8001:8001"
    container_name: auth-service
    environment:
      PORT: "8001"
      DATABASE_URL: postgres://auth_user:auth_pass@postgres-auth:5432/auth_db?sslmode=disable
      MASTER_KEY: local-master-key
    depends_on:
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  flag-service:
    build:
      context: ./flag-service
    ports:
      - "8002:8002"
    container_name: flag-service
    environment:
      PORT: "8002"
      DATABASE_URL: postgres://flags_user:flags_pass@postgres-flags:5432/flags_db
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      postgres-flags:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    restart: unless-stopped

  targeting-service:
    build:
      context: ./targeting-service
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
      DATABASE_URL: postgres://targeting_user:targeting_pass@postgres-targeting:5432/targeting_db
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      postgres-targeting:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    restart: unless-stopped

  evaluation-service:
    build:
      context: ./evaluation-service
    ports:
      - "8004:8004"
    environment:
      PORT: "8004"
      REDIS_URL: redis://redis:6379
      FLAG_SERVICE_URL: http://flag-service:8002
      TARGETING_SERVICE_URL: http://targeting-service:8003
      SERVICE_API_KEY: tm_key_EXAMPLE0000000000000000000000000000000000000000000000000000
      # --- LocalStack (local) ---
      AWS_SQS_URL: http://localstack:4566/000000000000/togglemaster-events
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      # --- AWS real (comentado, exemplo) ---
      # AWS_SQS_URL: https://sqs.us-east-1.amazonaws.com/123456789012/togglemaster-events
      # AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      # AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      # AWS_ENDPOINT_URL: <remover para apontar para AWS real>
    depends_on:
      redis:
        condition: service_healthy
      aws-init:
        condition: service_completed_successfully
      flag-service:
        condition: service_started
      targeting-service:
        condition: service_started
    restart: unless-stopped

  analytics-service:
    build:
      context: ./analytics-service
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      # --- LocalStack (local) ---
      AWS_SQS_URL: http://localstack:4566/000000000000/togglemaster-events
      AWS_DYNAMODB_TABLE: ToggleMasterAnalytics
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      # --- AWS real (comentado, exemplo) ---
      # AWS_SQS_URL: https://sqs.us-east-1.amazonaws.com/123456789012/togglemaster-events
      # AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      # AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      # AWS_ENDPOINT_URL: <remover para apontar para AWS real>
    depends_on:
      aws-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-auth-data:
  postgres-flags-data:
  postgres-targeting-data:
  localstack-data:
