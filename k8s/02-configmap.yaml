apiVersion: v1
kind: ConfigMap
metadata:
  name: toggle-master-config
  namespace: toggle-master
data:
  auth-service-port: "8001"
  flag-service-port: "8002"
  targeting-service-port: "8003"
  evaluation-service-port: "8004"
  analytics-service-port: "8005"
  auth-service-url: http://auth-service:8001
  flag-service-url: http://flag-service:8002
  targeting-service-url: http://targeting-service:8003
  redis-url: redis://redis:6379
  aws-sqs-url: https://sqs.us-east-1.amazonaws.com/123456789012/togglemaster-events
  aws-dynamodb-table: ToggleMasterAnalytics
  aws-region: us-east-1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-db-init
  namespace: toggle-master
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS api_keys (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        key_hash VARCHAR(64) NOT NULL UNIQUE,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: flags-db-init
  namespace: toggle-master
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS flags (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) UNIQUE NOT NULL,
        description TEXT,
        is_enabled BOOLEAN NOT NULL DEFAULT false,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON flags;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON flags
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: targeting-db-init
  namespace: toggle-master
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS targeting_rules (
        id SERIAL PRIMARY KEY,
        flag_name VARCHAR(100) UNIQUE NOT NULL,
        is_enabled BOOLEAN NOT NULL DEFAULT true,
        rules JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;

    DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

    CREATE TRIGGER set_timestamp
    BEFORE UPDATE ON targeting_rules
    FOR EACH ROW
    EXECUTE PROCEDURE trigger_set_timestamp();
